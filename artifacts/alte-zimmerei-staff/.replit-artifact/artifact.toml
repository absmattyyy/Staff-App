kind = "mobile"
previewPath = "/"
title = "Alte Zimmerei Staff App"
version = "1.0.0"
id = "artifacts/alte-zimmerei-staff"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21447

[services.development]
run = "pnpm --filter @workspace/alte-zimmerei-staff run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alte-zimmerei-staff", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/alte-zimmerei-staff", "run", "serve" ]

[services.env]
PORT = "21447"
BASE_PATH = "/"
